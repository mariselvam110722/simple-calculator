<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Neumorphic Calculator</title>
    <meta name="description" content="A modern and responsive calculator built with HTML, CSS, and Vanilla JavaScript.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <main class="calculator fade-in">
        <div class="display">
            <input type="text" id="screen" readonly placeholder="0" aria-label="Calculator display">
        </div>
        <div class="buttons">
            <button class="btn fn-btn" data-value="AC">AC</button>
            <button class="btn fn-btn" data-value="DE">DE</button>
            <button class="btn op-btn" data-value=".">.</button>
            <button class="btn op-btn" data-value="/">÷</button>

            <button class="btn num-btn" data-value="7">7</button>
            <button class="btn num-btn" data-value="8">8</button>
            <button class="btn num-btn" data-value="9">9</button>
            <button class="btn op-btn" data-value="*">×</button>

            <button class="btn num-btn" data-value="4">4</button>
            <button class="btn num-btn" data-value="5">5</button>
            <button class="btn num-btn" data-value="6">6</button>
            <button class="btn op-btn" data-value="-">-</button>

            <button class="btn num-btn" data-value="1">1</button>
            <button class="btn num-btn" data-value="2">2</button>
            <button class="btn num-btn" data-value="3">3</button>
            <button class="btn op-btn" data-value="+">+</button>

            <button class="btn num-btn" data-value="00">00</button>
            <button class="btn num-btn" data-value="0">0</button>
            <button class="btn op-btn span-two" data-value="=">=</button>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
